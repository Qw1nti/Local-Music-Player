name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build Linux package (optional)
        run: |
          if [ -f ../webApp/node_modules/@electron/packager/bin/electron-packager.js ]; then
            npm run build:linux
          else
            echo "Skipping package build; shared ../webApp dependencies are unavailable in CI."
          fi

      - name: Packaging smoke checks (optional)
        run: |
          if [ -f ../webApp/node_modules/@electron/packager/bin/electron-packager.js ]; then
            npm run smoke:packages
          else
            echo "Skipping package smoke checks; package build was skipped."
          fi
